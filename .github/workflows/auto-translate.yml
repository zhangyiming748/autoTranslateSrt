name: Auto Translate SRT

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  translate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      
      - name: Set up Go
        uses:  actions/setup-go@v6
        with:
          go-version: 'stable'
      
      - name: Install translate-shell
        run: |
          sudo apt-get update
          sudo apt-get install -y tree
          wget https://git.io/trans
          # 下载之后首先打印文件夹结构 这样即使出错也可溯源
          tree -lh
          chmod +x ./trans
          sudo mv ./trans /usr/local/bin/
          trans --version
     
      - name: Download dependencies
        run: go mod download
      
      - name: Create srt directory if not exists
        run: mkdir -p srt
      
      - name: Run translation program
        run: go run .
        working-directory: ${{ github.workspace }}
      
      - name: Commit translated files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add *.srt srt/*.srt
          git diff --cached --quiet || git commit -m "chore: auto-translate subtitles [skip ci]"
        
      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref }}
